<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Enny links</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --bg-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(rgba(0,0,255,0.5),cyan);
            background-image: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQfLEu-3U4Bdh5pEYx4_odcBv8YLjO_9JtZaQ&s");
            background-repeat:no-repeat ;
            background-size:cover;
            background-position: center;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Profile Section */
        .img {
            background: var(--primary-gradient);
            height: 100px;
            width: 100px;
            border-radius: 50%;
            font-size: 40px;
            font-weight: bold;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.4);
            transition: transform 0.5s ease;
        }

        .img:hover {
            transform: rotate(360deg);
        }

        .note b {
            font-size: 1.8rem;
            display: block;
            margin-bottom: 8px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .note p {
            font-size: 0.9rem;
            opacity: 0.8;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        /* Buttons Section */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-family: inherit;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn:hover {
            background: var(--primary-gradient);
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(0, 242, 254, 0.3);
            border-color: transparent;
        }

        .btn:active {
            transform: translateY(0);
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile">
            <div class="img">E</div>
            <div class="note">
                <b>Enny</b>
                <p>Frontend Developer In Progress</p>
            </div>
        </div>

        <div class="button-group">
            <button class="btn">Github</button>
            <button class="btn">Contact Me</button>
            <button class="btn">Discord</button>
        </div>
    </div>

</body>
</html>
